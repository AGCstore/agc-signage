<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FANG — Live Markets</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#131722; overflow:hidden; }
  #grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    width:100vw; height:100vh;
    background:#131722;
    box-sizing:border-box;
    gap: var(--gap, 2px);
    padding: var(--overscan, 0%);
  }
  .cell { position:relative; overflow:hidden; min-width:0; min-height:0; background:#131722; }
  .tradingview-widget-container,
  .tradingview-widget-container__widget { height:100%; width:100%; }
</style>
</head>
<body>
  <div id="grid"></div>

<script>
/* ============================================================
   FANG LIVE MARKET WALL — for a 50" TV via UniFi Display Cast Pro (Web Mode)
   ------------------------------------------------------------
   Edit CONFIG, save, host on Netlify (drag-and-drop), then point
   the Display Cast Pro's Web Mode URL at the resulting page.
   Charts are TradingView widgets — live, free, no API key needed.
   ============================================================ */
const CONFIG = {
  // Order fills the grid: top-left, top-right, bottom-left, bottom-right.
  // Format is EXCHANGE:TICKER. Swap freely (e.g. add NASDAQ:AAPL for FAANG).
  symbols: [
    "NASDAQ:META",    // Facebook / Meta
    "NASDAQ:AMZN",    // Amazon
    "NASDAQ:NFLX",    // Netflix
    "NASDAQ:GOOGL"    // Google / Alphabet
  ],

  interval: "D",                 // "1","5","15","60","D","W" — D=daily always looks full
  style: "1",                    // "1"=candles, "3"=area, "8"=Heikin-Ashi
  theme: "dark",
  timezone: "America/New_York",

  gapPx: 2,                      // seam between quadrants
  overscanPct: 0,                // raise to ~3 if your TV crops the edges
  reloadHours: 6                 // full-page refresh for clean 24/7 uptime; 0 = off
};

document.documentElement.style.setProperty('--gap', CONFIG.gapPx + 'px');
document.documentElement.style.setProperty('--overscan', CONFIG.overscanPct + '%');

function makeWidget(symbol) {
  const cell = document.createElement('div');
  cell.className = 'cell';

  const container = document.createElement('div');
  container.className = 'tradingview-widget-container';

  const widget = document.createElement('div');
  widget.className = 'tradingview-widget-container__widget';
  container.appendChild(widget);

  const script = document.createElement('script');
  script.type = 'text/javascript';
  script.async = true;
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.text = JSON.stringify({
    autosize: true,
    symbol: symbol,
    interval: CONFIG.interval,
    timezone: CONFIG.timezone,
    theme: CONFIG.theme,
    style: CONFIG.style,
    locale: "en",
    hide_top_toolbar: true,
    hide_side_toolbar: true,
    hide_legend: false,
    allow_symbol_change: false,
    save_image: false,
    calendar: false,
    support_host: "https://www.tradingview.com"
  });
  container.appendChild(script);

  cell.appendChild(container);
  return cell;
}

const grid = document.getElementById('grid');
CONFIG.symbols.forEach(sym => grid.appendChild(makeWidget(sym)));

if (CONFIG.reloadHours > 0) {
  setTimeout(() => location.reload(), CONFIG.reloadHours * 3600 * 1000);
}

// Best-effort keep-awake (harmless where unsupported)
if ('wakeLock' in navigator) {
  const keepAwake = () => navigator.wakeLock.request('screen').catch(() => {});
  keepAwake();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepAwake();
  });
}
</script>
</body>
</html>
